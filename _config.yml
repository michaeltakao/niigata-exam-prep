theme: minima
title: 新潟大学 編入試験対策
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
exclude:
  - scripts/
  - templates/
  - "*.py"
  - Makefile
  - "*.latex"

# Disable Liquid templating globally — content files use {{ }} for math/code
defaults:
  - scope:
      path: ""
    values:
      render_with_liquid: false
